all:
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3
    cluster_engine: rke2
    cluster_vip: 192.0.2.11
    cluster_domain: single-node.example.com
    rke2_token: "CHANGE_ME_VAULTED_RKE2_TOKEN"
    rke2_version: "CHANGE_ME_PIN_RKE2_VERSION"
    rke2_ingress_controller: traefik
    rke2_traefik_source: bundled
    # To pin an upstream Traefik chart instead of using the RKE2-bundled chart:
    # rke2_traefik_source: upstream
    # rke2_traefik_chart_version: "CHANGE_ME_PIN_TRAEFIK_CHART_VERSION"
    # rke2_traefik_image_tag: "CHANGE_ME_PIN_TRAEFIK_IMAGE_TAG"
    k3s_token: "CHANGE_ME_VAULTED_K3S_TOKEN"
    keepalived_auth_pass: "CHANGE_ME"
    keepalived_interface: eth0
    chrony_servers:
      - pool.ntp.org iburst
    pod_cidr: 100.64.0.0/16
    service_cidr: 100.65.0.0/16
    cluster_dns: 100.65.0.10
    cluster_underlay_cidrs:
      - 192.0.2.0/24
  children:
    cluster_nodes:
      children:
        rke2_servers:
        rke2_agents:
    rke2_servers:
      hosts:
        cip-single-01:
          ansible_host: 192.0.2.11
          node_ip: 192.0.2.11
    rke2_agents:
      hosts: {}
    load_balancers:
      hosts: {}
