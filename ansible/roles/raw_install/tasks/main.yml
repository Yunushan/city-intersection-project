---
- name: Create raw install directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/city-intersection
    - /etc/city-intersection
    - /var/log/city-intersection

- name: Render raw systemd service template for Linux hosts
  ansible.builtin.template:
    src: city-intersection.service.j2
    dest: /etc/systemd/system/city-intersection@.service
    mode: '0644'
  when: ansible_system == 'Linux'
