---
- name: Create raw install directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/urban-platform
    - /etc/urban-platform
    - /var/log/urban-platform

- name: Render raw systemd service template for Linux hosts
  ansible.builtin.template:
    src: urban-platform.service.j2
    dest: /etc/systemd/system/urban-platform@.service
    mode: '0644'
  when: ansible_system == 'Linux'
