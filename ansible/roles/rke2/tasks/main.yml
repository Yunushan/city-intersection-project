---
- name: Create RKE2 config directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'

- name: Render RKE2 server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
  when: inventory_hostname in groups['rke2_servers']

- name: Render RKE2 agent config
  ansible.builtin.template:
    src: agent-config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
  when: inventory_hostname in groups.get('rke2_agents', [])

- name: Install RKE2 server
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE=server INSTALL_RKE2_VERSION="{{ rke2_version | default('') }}" sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/rke2
  when: inventory_hostname in groups['rke2_servers']

- name: Install RKE2 agent
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE=agent INSTALL_RKE2_VERSION="{{ rke2_version | default('') }}" sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/rke2
  when: inventory_hostname in groups.get('rke2_agents', [])

- name: Enable RKE2 services
  ansible.builtin.service:
    name: "{{ 'rke2-server' if inventory_hostname in groups['rke2_servers'] else 'rke2-agent' }}"
    enabled: true
    state: started
