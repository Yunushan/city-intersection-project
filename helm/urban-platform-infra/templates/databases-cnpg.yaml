{{- if and .Values.databases.enabled (eq .Values.databases.provider "cloudnative-pg") }}
{{- range $name, $db := .Values.databases.instances }}
{{- if $db.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $name }}
  namespace: {{ include "cip.namespace" $ }}
  labels:
    {{- include "cip.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
    urban-platform.io/database-engine: {{ $db.engine | quote }}
spec:
  instances: {{ include "cip.replicaCount" (list $ ($db.instances | default $.Values.databases.defaultInstances)) }}
  {{- if $db.imageCatalogRef }}
  imageCatalogRef:
    apiGroup: {{ $db.imageCatalogRef.apiGroup | default "postgresql.cnpg.io" | quote }}
    kind: {{ $db.imageCatalogRef.kind | default "ImageCatalog" | quote }}
    name: {{ $db.imageCatalogRef.name | quote }}
    major: {{ required (printf "databases.instances.%s.imageCatalogRef.major is required" $name) $db.imageCatalogRef.major }}
  {{- else }}
  imageName: {{ include "cip.image" (list $ $db.image) | quote }}
  {{- end }}
  primaryUpdateStrategy: unsupervised
  bootstrap:
    initdb:
      database: {{ $db.database | quote }}
      owner: {{ $db.owner | quote }}
  storage:
    size: {{ $db.storage.size | default "20Gi" }}
    {{- if $db.storage.className }}
    storageClass: {{ $db.storage.className | quote }}
    {{- end }}
  monitoring:
    enablePodMonitor: true
{{- end }}
{{- end }}
{{- end }}
