{{- $tls := .Values.ingress.tls | default dict -}}
{{- $secretName := include "cip.ingressTlsSecretName" . -}}
{{- $namespace := include "cip.namespace" . -}}
{{- $host := include "cip.ingressHost" . -}}
{{- $selfSigned := $tls.selfSigned | default dict -}}
{{- $certManager := $tls.certManager | default dict -}}
{{- $tlsEnabled := true -}}
{{- if hasKey $tls "enabled" -}}
{{- $tlsEnabled = $tls.enabled -}}
{{- end -}}
{{- $createSecret := true -}}
{{- if hasKey $tls "createSecret" -}}
{{- $createSecret = $tls.createSecret -}}
{{- end -}}
{{- $selfSignedEnabled := true -}}
{{- if hasKey $selfSigned "enabled" -}}
{{- $selfSignedEnabled = $selfSigned.enabled -}}
{{- end -}}
{{- $certManagerEnabled := true -}}
{{- if hasKey $certManager "enabled" -}}
{{- $certManagerEnabled = $certManager.enabled -}}
{{- end -}}
{{- $externalTls := index .Values.secretManagement.externalSecrets "ingressTls" | default dict -}}
{{- $externalProvidesTls := and .Values.secretManagement.enabled (eq (.Values.secretManagement.provider | default "") "external-secrets") ($externalTls.enabled | default false) (eq ($externalTls.targetName | default "") $secretName) -}}
{{- if and .Values.ingress.enabled $tlsEnabled $createSecret $certManagerEnabled (not $externalProvidesTls) -}}
{{- $requiredHost := required "ingress host or global.cluster.domain is required for the default TLS certificate" $host -}}
{{- $defaultIssuerName := printf "%s-selfsigned" (include "cip.name" .) | trunc 63 | trimSuffix "-" -}}
{{- $issuerName := $certManager.issuerName | default $defaultIssuerName -}}
{{- if and (not $selfSignedEnabled) (eq ($certManager.issuerName | default "") "") -}}
{{- required "ingress.tls.certManager.issuerName is required when ingress.tls.selfSigned.enabled=false" "" -}}
{{- end -}}
{{- $issuerKind := $certManager.issuerKind | default "Issuer" -}}
{{- $issuerGroup := $certManager.issuerGroup | default "cert-manager.io" -}}
{{- if $selfSignedEnabled }}
---
apiVersion: cert-manager.io/v1
kind: {{ $issuerKind }}
metadata:
  name: {{ $issuerName | quote }}
{{ if ne $issuerKind "ClusterIssuer" }}
  namespace: {{ $namespace }}
{{ end }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    urban-platform.io/tls-source: "self-signed"
spec:
  selfSigned: {}
{{ end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-certificate" $secretName | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ $namespace }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    urban-platform.io/tls-source: {{ ternary "self-signed" "cert-manager" $selfSignedEnabled | quote }}
spec:
  secretName: {{ $secretName | quote }}
  commonName: {{ $requiredHost | quote }}
  dnsNames:
    - {{ $requiredHost | quote }}
  duration: {{ $certManager.duration | default "87600h" | quote }}
  renewBefore: {{ $certManager.renewBefore | default "720h" | quote }}
  issuerRef:
    name: {{ $issuerName | quote }}
    kind: {{ $issuerKind | quote }}
    group: {{ $issuerGroup | quote }}
{{- end }}
