{{- $tls := .Values.ingress.tls | default dict -}}
{{- $secretName := include "cip.ingressTlsSecretName" . -}}
{{- $namespace := include "cip.namespace" . -}}
{{- $host := include "cip.ingressHost" . -}}
{{- $certificate := $tls.certificate | default dict -}}
{{- $selfSigned := $tls.selfSigned | default dict -}}
{{- $inlineCrt := $certificate.crt | default "" -}}
{{- $inlineKey := $certificate.key | default "" -}}
{{- $hasInlineCertificate := and (ne $inlineCrt "") (ne $inlineKey "") -}}
{{- $tlsEnabled := true -}}
{{- if hasKey $tls "enabled" -}}
{{- $tlsEnabled = $tls.enabled -}}
{{- end -}}
{{- $createSecret := true -}}
{{- if hasKey $tls "createSecret" -}}
{{- $createSecret = $tls.createSecret -}}
{{- end -}}
{{- $selfSignedEnabled := true -}}
{{- if hasKey $selfSigned "enabled" -}}
{{- $selfSignedEnabled = $selfSigned.enabled -}}
{{- end -}}
{{- $externalTls := index .Values.secretManagement.externalSecrets "ingressTls" | default dict -}}
{{- $externalProvidesTls := and .Values.secretManagement.enabled (eq (.Values.secretManagement.provider | default "") "external-secrets") ($externalTls.enabled | default false) (eq ($externalTls.targetName | default "") $secretName) -}}
{{- $existingSecret := lookup "v1" "Secret" $namespace $secretName -}}
{{- if and .Values.ingress.enabled $tlsEnabled $createSecret (not $externalProvidesTls) (not $existingSecret) (or $hasInlineCertificate $selfSignedEnabled) -}}
{{- $requiredHost := required "ingress host or global.cluster.domain is required for the default TLS certificate" $host -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName | quote }}
  namespace: {{ $namespace }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    urban-platform.io/tls-source: {{ ternary "provided" "self-signed" $hasInlineCertificate | quote }}
type: kubernetes.io/tls
data:
  {{- if $hasInlineCertificate }}
  tls.crt: {{ $inlineCrt | b64enc | quote }}
  tls.key: {{ $inlineKey | b64enc | quote }}
  {{- else }}
  {{- $durationDays := int ($selfSigned.durationDays | default 3650) -}}
  {{- $generated := genSelfSignedCert $requiredHost nil (list $requiredHost) $durationDays -}}
  tls.crt: {{ $generated.Cert | b64enc | quote }}
  tls.key: {{ $generated.Key | b64enc | quote }}
  {{- end }}
{{- end }}
