version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "python"
    ignore:
      # requirements-ci.txt intentionally backs the legacy Python 3.11 /
      # ansible-core 2.14 lane. Modern Ansible updates live in
      # requirements-ci-modern.txt and are promoted deliberately.
      - dependency-name: "ansible-core"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      ci-python:
        patterns:
          - "*"
